name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history so the annotated tag message is available

      - name: Build universal binary
        run: bash scripts/build-universal.sh

      - name: Package zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd build
          zip -r "../touchutil-${VERSION}.zip" touchutil.app
          cd ..
          echo "ZIP=touchutil-${VERSION}.zip" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Compute sha256
        run: echo "SHA256=$(shasum -a 256 "$ZIP" | awk '{print $1}')" >> "$GITHUB_ENV"

      - name: Extract release notes from tag message
        run: |
          # Use the annotated tag's message as the release body. Falls back to a
          # default line if the tag was created without a message.
          NOTES="$(git tag -l --format='%(contents)' "$GITHUB_REF_NAME")"
          if [ -z "$NOTES" ]; then
            NOTES="Release ${GITHUB_REF_NAME}"
          fi
          {
            echo "NOTES<<__EOF__"
            echo "$NOTES"
            echo "__EOF__"
          } >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}   # title is just the version, e.g. v1.2.7
          body: ${{ env.NOTES }}
          files: ${{ env.ZIP }}

      - name: Update homebrew-tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/keys2505/homebrew-tap.git" /tmp/homebrew-tap

          FORMULA="/tmp/homebrew-tap/Casks/touchutil.rb"
          sed -i '' "s|version \".*\"|version \"${VERSION}\"|" "$FORMULA"
          sed -i '' "s|sha256 \".*\"|sha256 \"${SHA256}\"|" "$FORMULA"

          cd /tmp/homebrew-tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/touchutil.rb
          git commit -m "touchutil ${VERSION}" || echo "No changes to commit"
          git push
